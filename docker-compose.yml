services:
    db:
        image: postgres:15
        networks:
            - intra
        env_file:
            - .env
        volumes:
            - pgdata:/var/lib/postgresql/data

    redis:
        image: redis:7
        networks:
            - intra
        ports:
            - "6379:6379"
        volumes:
            - redisdata:/data

    backend:
        build: ./backend
        ports:
            - "8000:8000"
            - "53200-53300:53200-53300"
        networks:
            - intra
        depends_on:
            - db
        env_file:
            - .env
        volumes:
            - ./backend:/app/backend
            - ../ft_transcendence_front/app/src/media:/app/media

networks:
    intra:
        external: true

volumes:
    pgdata:
    redisdata:

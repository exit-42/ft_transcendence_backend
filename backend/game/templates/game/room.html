<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Multiplayer Game</title>
    <style>
        #game-container {
            width: 600px;
            height: 400px;
            border: 2px solid black;
            position: relative;
            overflow: hidden;
        }
        .ball {
            width: 20px;
            height: 20px;
            background-color: red;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <h2>Multiplayer Game: Room <span id="room-display"></span></h2>
    <div id="game-container">
        <div id="ball" class="ball"></div>
    </div>
    <p>Ball Position: <span id="ball-position">(x: 0, y: 0)</span></p>

    {{ room_name|json_script:"room-name" }}

    <script>
        const roomName = JSON.parse(document.getElementById('room-name').textContent);
        document.getElementById('room-display').innerText = roomName;

        const gameSocket = new WebSocket(
            'ws://'
            + window.location.host
            + '/ws/game/'
            + roomName
            + '/'
        );

        const ball = document.getElementById('ball');
        let ballPosition = { x: 300, y: 200 }; // 초기 공 위치

        gameSocket.onmessage = function(e) {
            console.log(e);
            const data = JSON.parse(e.data);
            if (data.type === "state_update") {
                ballPosition = data.objects;
                ball.style.left = ballPosition.x * 5 + "px";
                ball.style.top = ballPosition.y * 5 + "px";
                document.getElementById('ball-position').innerText = `(x: ${ballPosition.x}, y: ${ballPosition.y})`;
            }
        };

        gameSocket.onclose = function(e) {
            console.error('Game socket closed unexpectedly');
        };

        // 키 입력 감지 및 전송
        document.addEventListener("keydown", (event) => {
            gameSocket.send(JSON.stringify({
                type: "input",
                key: event.key
            }));
            console.log(event.key);
        });

    </script>
</body>
</html>
